<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>FinTube</title>
</head>
<body>
    <div id="FinTubeConfigPage" data-role="page" class="page type-interior pluginConfigurationPage" data-require="emby-input,emby-button,emby-select,emby-checkbox">
        <div data-role="content">
            <div class="content-primary">
                <h2>FinTube Dependencies</h2>
                <p style="opacity:0.8;">Binaries are managed automatically by FinTube. Missing tools can be installed from the FinTube download page.</p>
                <div id="fintube-info-panel" style="margin-top:0.5em; border:1px solid #444; border-radius:4px; padding:0.6em 0.9em; font-size:0.85em; font-family:monospace; word-break:break-all;">Loading…</div>
            </div>
        </div>
        <script type="text/javascript">
            function escapeHtml(text) {
                let div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            function renderInfo(data) {
                let panel = document.getElementById('fintube-info-panel');

                function line(label, dep) {
                    dep = dep || {};
                    let state = dep.installed
                        ? ('installed' + (dep.version ? ' v' + dep.version : '') + (dep.managed ? ' (managed)' : ''))
                        : 'not installed';
                    return '<div><strong>' + label + ':</strong> ' + escapeHtml(state) + '</div>' +
                        '<div style="opacity:0.7; margin-bottom:0.4em;">' + escapeHtml(dep.path || '') + '</div>';
                }

                let html = '<div><strong>Install directory:</strong></div>';
                html += '<div style="opacity:0.7; margin-bottom:0.6em;">' + escapeHtml(data.binDir || '') + '</div>';
                html += line('yt-dlp', data.ytdlp);
                html += line('deno', data.deno);
                panel.innerHTML = html;
            }

            document.querySelector('#FinTubeConfigPage')
                .addEventListener('pageshow', function() {
                    Dashboard.showLoadingMsg();
                    const url = ApiClient.getUrl("fintube/dependencies");
                    ApiClient.ajax({ type: "GET", url: url, dataType: "json", contentType: 'application/json' })
                        .then(function(data) {
                            renderInfo(data);
                            Dashboard.hideLoadingMsg();
                        })
                        .catch(function() {
                            document.getElementById('fintube-info-panel').textContent =
                                "Could not load dependency info.";
                            Dashboard.hideLoadingMsg();
                        });
                });
        </script>
    </div>
</body>
</html>
